<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanSole | Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cabeçalho -->
    <header class="cabecalho">
        <div class="logo-container" style="flex: 1; display: flex; justify-content: flex-start;">
            <a href="index.html">
                <img src="urbansolelogo.png" alt="UrbanSole Logo" class="logo">
            </a>
        </div>

        
        <div style="flex: 1; display: flex; justify-content: flex-end;">
            <button id="btn-autenticacao" class="btn-secundario" onclick="window.location.href='login.html'">Carregando...</button>
        </div>
    </header>

    <main style="min-height: 70vh; display: flex; align-items: center;">
        <div class="caixa-formulario">
            <h2>Cadastro</h2>
            
            <label>Como quer ser chamado?</label>
            <input type="text" id="nome-cadastro" placeholder="Insira seu nome">
            
            <label>E-mail:</label>
            <input type="email" placeholder="Insira seu email">
            
            <label>Senha:</label>
            <input type="password" placeholder="Crie uma nova senha">
            
            <button class="btn-primario btn-bloco" onclick="fazerCadastro()">Criar Conta</button>
            
            <div class="linha-divisao"></div>
            <button class="btn-texto" onclick="window.location.href='login.html'">Já tem cadastro? Login</button>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="rodape">
        <p>Acesse também no <strong>Mercado Livre</strong> e <strong>Amazon</strong></p>
        <p>Siga-nos: <strong>Instagram</strong> | <strong>Facebook</strong></p>
        <p>Presente em: Brasil | EUA | Chile | Itália</p>
        <p class="aviso-rodape">Loja 100% online. Não possuímos endereço físico.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
